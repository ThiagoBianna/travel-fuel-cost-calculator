# URL do banco - se não achar a variável, ele ainda tenta o localhost como reserva
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vaidarquanto}

# Usuário do banco - agora ele vai ler a variável DB_USER que você criou
spring.datasource.username=${DB_USER:postgres}

# Senha do banco - agora ele vai ler a variável DB_PASSWORD
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true